<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00a884">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-background">
        <div class="top-green-bar"></div>
    </div>

    <div class="main-container">
        <!-- Landing  -->
        <div id="auth-container" class="auth-container">
            
            <!-- Landing Screen -->
            <div id="landing-screen" class="auth-box">
                <div class="logo">💬</div>
                <h1>Chat</h1>
                <p>Connect with your friends securely.</p>
                <div class="auth-buttons">
                    <button id="show-login-btn" class="btn-primary">Login</button>
                    <button id="show-signup-btn" class="btn-secondary">Sign Up</button>
                    <button id="google-signin-btn" class="btn-outline">Sign in with Google</button>
                </div>
            </div>

            <!-- Login Screen -->
            <div id="login-screen" class="auth-box hidden">
                <div class="back-link" id="login-to-landing">← Back</div>
                <h2>Login</h2>
                <form id="login-form">
                    <input type="email" id="login-email" placeholder="Email" required>
                    <input type="password" id="login-password" placeholder="Password" required>
                    <button type="submit" class="btn-primary">Login</button>
                </form>
                <p class="switch-auth">Don't have an account? <span id="link-to-signup">Sign up</span></p>
                <p id="login-error" class="error-msg"></p>
            </div>

            <!-- Signup Screen -->
            <div id="signup-screen" class="auth-box hidden">
                <div class="back-link" id="signup-to-landing">← Back</div>
                <h2>Create Account</h2>
                <form id="signup-form">
                    <input type="text" id="signup-name" placeholder="Full Name" required>
                    <input type="email" id="signup-email" placeholder="Email" required>
                    <input type="tel" id="signup-phone" placeholder="Phone Number" required pattern="[0-9]{10,15}" title="Enter a valid phone number (10-15 digits)">
                    <input type="password" id="signup-password" placeholder="Strong Password" required pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[\W]).{8,}" title="Must contain at least one number and one uppercase and lowercase letter, one special character, and at least 8 or more characters">
                    
                    <button type="submit" class="btn-primary" id="signup-submit-btn">Sign Up</button>
                </form>
                <p class="switch-auth">Already have an account? <span id="link-to-login">Login</span></p>
                <p id="signup-error" class="error-msg"></p>
            </div>
        </div>

        <!-- Main Chat Application -->
        <div id="whatsapp-app" class="whatsapp-app hidden">
            <!-- Left Sidebar -->
            <div class="sidebar" id="sidebar">
                <header class="sidebar-header">
                    <div class="my-profile">
                        <div class="avatar-container">
                            <img id="my-profile-img" src="default-avatar.png" alt="Profile" class="avatar clickable">
                            <input type="file" id="profile-photo-upload" accept="image/*" class="hidden">
                        </div>
                        <span id="my-profile-name">Loading...</span>
                    </div>
                    <div class="sidebar-actions">
                        <button id="dark-mode-toggle" class="icon-btn" title="Toggle Dark Mode">🌓</button>
                        <button id="logout-btn" class="icon-btn" title="Logout">🚪</button>
                    </div>
                </header>
                <div class="search-bar">
                    <input type="text" placeholder="Search or start new chat">
                </div>
                <div id="contact-list" class="contact-list">
                    <!-- Contacts injected here -->
                </div>
            </div>

            <!-- Right Chat Area -->
            <div class="chat-area" id="chat-area">
                <!-- Empty State -->
                <div id="empty-chat-state" class="empty-state">
                    <div class="empty-state-content">
                        <h2>Chat</h2>
                        <p>Select a contact to start messaging.</p>
                    </div>
                </div>

                <!-- Active Chat -->
                <div id="active-chat-container" class="active-chat-container hidden">
                    <header class="chat-header">
                        <button id="chat-back-btn" class="chat-back-btn">←</button>
                        <div class="chat-contact-info">
                            <img id="active-chat-img" src="default-avatar.png" alt="Profile" class="avatar">
                            <div class="chat-contact-meta">
                                <span id="active-chat-name">Contact Name</span>
                                <span id="typing-indicator" class="typing-indicator hidden">typing...</span>
                            </div>
                        </div>
                    </header>
                    <main id="chat-messages" class="chat-messages">
                        <!-- Messages injected here -->
                    </main>
                    <footer class="chat-footer">
                        <form id="message-form">
                            <label for="chat-image-upload" class="icon-btn">📎</label>
                            <input type="file" id="chat-image-upload" accept="image/*" class="hidden">
                            <input type="text" id="message-input" placeholder="Type a message" required autocomplete="off">
                            <button type="submit" class="send-btn">➤</button>
                        </form>
                    </footer>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script>
        //  Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(reg => {
                    console.log('ServiceWorker registered');
                }).catch(err => {
                    console.log('ServiceWorker error: ', err);
                });
            });
        }
    </script>
</body>
</html>
